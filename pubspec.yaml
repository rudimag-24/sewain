name: sewain
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  dotted_border: ^3.1.0
  flutter_svg: ^2.3.0
  google_fonts: ^8.1.0
  image_picker: ^1.2.2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  dartz: ^0.10.1
  http: ^1.6.0
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: 2.4.15
  flutter_gen_runner: ^5.10.0
  freezed: ^3.0.6

flutter:
  uses-material-design: true

  assets:
    # - assets/images/
    - assets/icons/
    - assets/icons/alert/

flutter_gen:
  output: lib/core/assets/
  integrations:
    flutter_svg: true