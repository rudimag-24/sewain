name: sewain
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.2
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  dotted_border: ^3.1.0
  flutter_svg: ^2.3.0
  google_fonts: ^8.1.0
  image_picker: ^1.2.2

  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  dartz: ^0.10.1
  http: ^1.6.0
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0

dev_dependencies:

  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  flutter_gen_runner: ^5.14.1
  freezed: ^4.0.0-dev.3


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    # - assets/images/banks/
    - assets/icons/
    - assets/icons/alert/

flutter_gen:
  output: lib/core/assets/
  integrations:
    flutter_svg: true